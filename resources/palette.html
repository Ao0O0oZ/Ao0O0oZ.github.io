<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Academic Color Palette</title>
  <link rel="icon" href="../images/favicon.png">
  <style>
    :root {
      --navy: #1a2744;
      --blue: #2a6496;
      --blue-light: #3a7cbd;
      --accent: #c69c4a;
      --text: #2c2c2c;
      --muted: #666;
      --bg: #f8f7f4;
      --panel: #ffffff;
      --line: #e4dfd3;
      --soft: #f1efe8;
      --shadow: 0 14px 36px rgba(46, 42, 35, 0.08);
      --page-width: 88%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 8% -4%, rgba(58, 124, 189, 0.15), transparent 30rem),
        linear-gradient(180deg, #fbfaf6 0%, var(--bg) 36rem);
      font-family: "Source Sans 3", "Source Sans Pro", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
    }

    button, input {
      font: inherit;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .shell {
      width: var(--page-width);
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 28px;
    }

    .back-link {
      color: var(--navy);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .copy-status {
      min-height: 2.3rem;
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(46, 42, 35, 0.05);
    }

    .copy-status.active {
      border-color: rgba(42, 100, 150, 0.28);
      color: var(--navy);
      background: #e9f1f8;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
      gap: 2rem;
      align-items: end;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 0.55rem;
      color: var(--navy);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.15rem, 5vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: 1.04rem;
    }

    .search-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      padding: 0.8rem;
    }

    .search-panel label {
      display: block;
      margin: 0 0 0.45rem;
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .search-row input {
      width: 100%;
      min-width: 0;
      height: 2.7rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 0.85rem;
      outline: none;
    }

    .search-row input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(42, 100, 150, 0.12);
    }

    .clear-btn {
      height: 2.7rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      color: var(--navy);
      padding: 0 0.85rem;
      cursor: pointer;
    }

    .filter-tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 0.55rem;
      overflow: auto;
      margin: 0 -0.4rem 26px;
      padding: 0.8rem 0.4rem;
      background: rgba(248, 247, 244, 0.92);
      backdrop-filter: blur(12px);
    }

    .filter-tabs button {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--navy);
      padding: 0.45rem 0.9rem;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
    }

    .filter-tabs button[aria-pressed="true"] {
      border-color: var(--navy);
      background: var(--navy);
      color: #fff;
    }

    .section {
      margin: 0 0 34px;
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.55rem;
    }

    .section-heading h2 {
      margin: 0;
      color: var(--navy);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .palette-grid.wide-grid {
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    }

    .palette-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(46, 42, 35, 0.06);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .palette-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .swatches {
      display: grid;
      min-height: 128px;
    }

    .swatch {
      position: relative;
      min-width: 0;
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .swatch::after {
      content: attr(data-hex);
      position: absolute;
      inset: 0;
      opacity: 0;
      display: grid;
      place-items: center;
      color: var(--label);
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      transition: opacity 0.16s ease;
      text-shadow: 0 1px 10px var(--shadow-color);
      pointer-events: none;
    }

    .swatch:hover::after,
    .swatch:focus-visible::after {
      opacity: 1;
    }

    .swatch:focus-visible {
      z-index: 2;
      outline: 3px solid rgba(42, 100, 150, 0.38);
      outline-offset: -3px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.78rem 0.88rem;
    }

    .card-title {
      overflow: hidden;
      color: var(--navy);
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-colors {
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .family-grid .swatches {
      min-height: 168px;
      grid-template-rows: repeat(2, 1fr);
      grid-auto-flow: column;
    }

    .wide-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--muted);
      padding: 2.2rem;
      text-align: center;
    }

    .empty.visible { display: block; }

    @media (max-width: 820px) {
      .shell {
        padding-top: 18px;
      }

      .topbar,
      .hero {
        display: flex;
        align-items: stretch;
        flex-direction: column;
      }

      .hero {
        gap: 1.2rem;
      }

      .copy-status {
        justify-content: center;
        white-space: normal;
      }

      .palette-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .wide-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .swatch::after {
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a class="back-link" href="../index.html#resources">Back to Resources</a>
      <div class="copy-status" id="copyStatus" aria-live="polite">Click a swatch to copy hex RGB.</div>
    </div>

    <header class="hero">
      <div>
        <h1>Academic Color Palette</h1>
        <p>Browse figure-ready color sets as palette cards. Each swatch copies its hexadecimal RGB value.</p>
      </div>
      <div class="search-panel">
        <label for="paletteSearch">Search palettes</label>
        <div class="search-row">
          <input id="paletteSearch" type="search" placeholder="Try blue, #2a9d8f, material, 5 colors">
          <button class="clear-btn" id="clearSearch" type="button">Clear</button>
        </div>
      </div>
    </header>

    <nav class="filter-tabs" id="filters" aria-label="Palette filters"></nav>
    <div id="paletteRoot"></div>
    <div class="empty" id="emptyState">No palettes match the current search.</div>
  </main>

  <script>
    const materialFamilies = [
      ["Red", ["#ffebee", "#ffcdd2", "#ef9a9a", "#e57373", "#ef5350", "#f44336", "#e53935", "#d32f2f", "#c62828", "#b71c1c"]],
      ["Pink", ["#fce4ec", "#f8bbd0", "#f48fb1", "#f06292", "#ec407a", "#e91e63", "#d81b60", "#c2185b", "#ad1457", "#880e4f"]],
      ["Purple", ["#f3e5f5", "#e1bee7", "#ce93d8", "#ba68c8", "#ab47bc", "#9c27b0", "#8e24aa", "#7b1fa2", "#6a1b9a", "#4a148c"]],
      ["Deep Purple", ["#ede7f6", "#d1c4e9", "#b39ddb", "#9575cd", "#7e57c2", "#673ab7", "#5e35b1", "#512da8", "#4527a0", "#311b92"]],
      ["Indigo", ["#e8eaf6", "#c5cae9", "#9fa8da", "#7986cb", "#5c6bc0", "#3f51b5", "#3949ab", "#303f9f", "#283593", "#1a237e"]],
      ["Blue", ["#e3f2fd", "#bbdefb", "#90caf9", "#64b5f6", "#42a5f5", "#2196f3", "#1e88e5", "#1976d2", "#1565c0", "#0d47a1"]],
      ["Light Blue", ["#e1f5fe", "#b3e5fc", "#81d4fa", "#4fc3f7", "#29b6f6", "#03a9f4", "#039be5", "#0288d1", "#0277bd", "#01579b"]],
      ["Cyan", ["#e0f7fa", "#b2ebf2", "#80deea", "#4dd0e1", "#26c6da", "#00bcd4", "#00acc1", "#0097a7", "#00838f", "#006064"]],
      ["Teal", ["#e0f2f1", "#b2dfdb", "#80cbc4", "#4db6ac", "#26a69a", "#009688", "#00897b", "#00796b", "#00695c", "#004d40"]],
      ["Green", ["#e8f5e9", "#c8e6c9", "#a5d6a7", "#81c784", "#66bb6a", "#4caf50", "#43a047", "#388e3c", "#2e7d32", "#1b5e20"]],
      ["Light Green", ["#f1f8e9", "#dcedc8", "#c5e1a5", "#aed581", "#9ccc65", "#8bc34a", "#7cb342", "#689f38", "#558b2f", "#33691e"]],
      ["Lime", ["#f9fbe7", "#f0f4c3", "#e6ee9c", "#dce775", "#d4e157", "#cddc39", "#c0ca33", "#afb42b", "#9e9d24", "#827717"]],
      ["Yellow", ["#fffde7", "#fff9c4", "#fff59d", "#fff176", "#ffee58", "#ffeb3b", "#fdd835", "#fbc02d", "#f9a825", "#f57f17"]],
      ["Amber", ["#fff8e1", "#ffecb3", "#ffe082", "#ffd54f", "#ffca28", "#ffc107", "#ffb300", "#ffa000", "#ff8f00", "#ff6f00"]],
      ["Orange", ["#fff3e0", "#ffe0b2", "#ffcc80", "#ffb74d", "#ffa726", "#ff9800", "#fb8c00", "#f57c00", "#ef6c00", "#e65100"]],
      ["Deep Orange", ["#fbe9e7", "#ffccbc", "#ffab91", "#ff8a65", "#ff7043", "#ff5722", "#f4511e", "#e64a19", "#d84315", "#bf360c"]],
      ["Brown", ["#efebe9", "#d7ccc8", "#bcaaa4", "#a1887f", "#8d6e63", "#795548", "#6d4c41", "#5d4037", "#4e342e", "#3e2723"]],
      ["Grey", ["#fafafa", "#f5f5f5", "#eeeeee", "#e0e0e0", "#bdbdbd", "#9e9e9e", "#757575", "#616161", "#424242", "#212121"]],
      ["Blue Grey", ["#eceff1", "#cfd8dc", "#b0bec5", "#90a4ae", "#78909c", "#607d8b", "#546e7a", "#455a64", "#37474f", "#263238"]]
    ];

    const palettes = [
      { group: "2 Colors", name: "Deep Teal", colors: ["#003049", "#52b788"] },
      { group: "2 Colors", name: "Violet Apricot", colors: ["#432371", "#faae7b"] },
      { group: "2 Colors", name: "Ink Cream", colors: ["#0d3b66", "#faf0ca"] },
      { group: "2 Colors", name: "Periwinkle Pink", colors: ["#696eff", "#f8acff"] },
      { group: "2 Colors", name: "Graphite Tangerine", colors: ["#233d4d", "#fe7f2d"] },
      { group: "2 Colors", name: "Magenta Cyan", colors: ["#e81cff", "#40c9ff"] },
      { group: "2 Colors", name: "Teal Coral", colors: ["#2a9d8f", "#e76f51"] },
      { group: "2 Colors", name: "Pine Rose", colors: ["#0f7173", "#f05d5e"] },
      { group: "2 Colors", name: "Aqua Signal", colors: ["#1ddbe6", "#f1515e"] },
      { group: "3 Colors", name: "Signal Warm", colors: ["#c5283d", "#e9724c", "#ffc857"] },
      { group: "3 Colors", name: "Muted Rosy", colors: ["#5d2e46", "#ad6a6c", "#d0ada7"] },
      { group: "3 Colors", name: "Fresh Cyan", colors: ["#348aa7", "#5dd39e", "#bce784"] },
      { group: "3 Colors", name: "Scientific Trio", colors: ["#264653", "#2a9d8f", "#e9c46a"] },
      { group: "3 Colors", name: "Charcoal Red", colors: ["#393e41", "#e94f37", "#f6f7eb"] },
      { group: "3 Colors", name: "Soft Neon", colors: ["#eca0ff", "#aab2ff", "#84ffc9"] },
      { group: "3 Colors", name: "Poster Core", colors: ["#26547c", "#ef476f", "#ffd166"] },
      { group: "3 Colors", name: "Olive Citrus", colors: ["#8cb369", "#f4e285", "#f4a259"] },
      { group: "3 Colors", name: "Coral Teal", colors: ["#ef5b5b", "#20a39e", "#ffba49"] },
      { group: "4 Colors", name: "Warm Abstract", colors: ["#481d24", "#c5283d", "#e9724c", "#ffc857"] },
      { group: "4 Colors", name: "Atlantic", colors: ["#1d3557", "#457b9d", "#a8dadc", "#f1faee"] },
      { group: "4 Colors", name: "Violet Slate", colors: ["#360568", "#5b2a86", "#7785ac", "#9ac6c5"] },
      { group: "4 Colors", name: "Deep Mint", colors: ["#3c1642", "#086375", "#1dd3b0", "#affc41"] },
      { group: "4 Colors", name: "Muted Terrain", colors: ["#071e22", "#1d7874", "#679289", "#f4c095"] },
      { group: "4 Colors", name: "Dusty Diverge", colors: ["#355070", "#6d597a", "#b56576", "#e56b6f"] },
      { group: "4 Colors", name: "Primary Accent", colors: ["#003049", "#d62828", "#f77f00", "#fcbf49"] },
      { group: "4 Colors", name: "Bright Figure", colors: ["#9b5de5", "#f15bb5", "#fee440", "#00bbf9"] },
      { group: "4 Colors", name: "Clean Report", colors: ["#26547c", "#ef476f", "#ffd166", "#06d6a0"] },
      { group: "5 Colors", name: "Autumn Scale", colors: ["#780116", "#c32f27", "#d8572a", "#db7c26", "#f7b538"] },
      { group: "5 Colors", name: "Blue Sequential", colors: ["#003249", "#007ea7", "#80ced7", "#9ad1d4", "#ccdbdc"] },
      { group: "5 Colors", name: "Dusty Rose", colors: ["#355070", "#6d597a", "#b56576", "#e56b6f", "#eaac8b"] },
      { group: "5 Colors", name: "Muted Purple", colors: ["#231942", "#5e548e", "#9f86c0", "#be95c4", "#e0b1cb"] },
      { group: "5 Colors", name: "Neon Warm", colors: ["#390099", "#9e0059", "#ff0054", "#ff5400", "#ffbd00"] },
      { group: "5 Colors", name: "Ocean Greens", colors: ["#513b56", "#525174", "#348aa7", "#5dd39e", "#bce784"] },
      { group: "5 Colors", name: "Scientific Classic", colors: ["#264653", "#2a9d8f", "#e9c46a", "#f4a261", "#e76f51"] },
      { group: "5 Colors", name: "Earth Diverge", colors: ["#283d3b", "#197278", "#edddd4", "#c44536", "#772e25"] },
      { group: "5 Colors", name: "Presentation Bright", colors: ["#6a4c93", "#1982c4", "#8ac926", "#ffca3a", "#ff595e"] }
    ];

    const sections = [
      { id: "all", label: "All" },
      { id: "Material", label: "Material" },
      { id: "2 Colors", label: "2 Colors" },
      { id: "3 Colors", label: "3 Colors" },
      { id: "4 Colors", label: "4 Colors" },
      { id: "5 Colors", label: "5 Colors" }
    ];

    const state = {
      filter: "all",
      query: ""
    };

    const root = document.getElementById("paletteRoot");
    const filters = document.getElementById("filters");
    const search = document.getElementById("paletteSearch");
    const clearSearch = document.getElementById("clearSearch");
    const emptyState = document.getElementById("emptyState");
    const copyStatus = document.getElementById("copyStatus");
    let copyTimer;

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      const value = parseInt(clean, 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    }

    function contrastColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      return luminance > 0.58 ? "#1a2744" : "#ffffff";
    }

    function matches(item) {
      const query = state.query.trim().toLowerCase();
      if (state.filter !== "all" && item.group !== state.filter) return false;
      if (!query) return true;
      const haystack = [item.group, item.name, ...item.colors].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function makeSwatch(hex) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "swatch";
      button.style.background = hex;
      button.style.setProperty("--label", contrastColor(hex));
      button.style.setProperty("--shadow-color", contrastColor(hex) === "#ffffff" ? "rgba(0, 0, 0, 0.42)" : "rgba(255, 255, 255, 0.42)");
      button.dataset.hex = hex;
      button.setAttribute("aria-label", `Copy ${hex}`);
      button.addEventListener("click", () => copyHex(hex));
      return button;
    }

    function makeCard(item, familyCard = false) {
      const article = document.createElement("article");
      article.className = "palette-card";
      article.dataset.group = item.group;
      article.dataset.name = item.name;
      article.dataset.colors = item.colors.join(" ");

      const swatches = document.createElement("div");
      swatches.className = "swatches";
      swatches.style.gridTemplateColumns = `repeat(${familyCard ? 5 : item.colors.length}, minmax(0, 1fr))`;
      item.colors.forEach((hex) => swatches.appendChild(makeSwatch(hex)));

      const meta = document.createElement("div");
      meta.className = "card-meta";
      meta.innerHTML = `<span class="card-title">${item.name}</span><span class="card-colors">${item.colors.length} colors</span>`;

      article.append(swatches, meta);
      return article;
    }

    function makeSection(title, items, familyCard = false, wideGrid = false) {
      const visible = items.filter(matches);
      if (!visible.length) return null;

      const section = document.createElement("section");
      section.className = "section";
      const heading = document.createElement("div");
      heading.className = "section-heading";
      heading.innerHTML = `<h2>${title}</h2><span class="count">${visible.length} palettes</span>`;

      const grid = document.createElement("div");
      grid.className = `palette-grid${familyCard ? " family-grid" : ""}${wideGrid ? " wide-grid" : ""}`;
      visible.forEach((item) => grid.appendChild(makeCard(item, familyCard)));
      section.append(heading, grid);
      return section;
    }

    function renderFilters() {
      filters.innerHTML = "";
      sections.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = section.label;
        button.setAttribute("aria-pressed", String(state.filter === section.id));
        button.addEventListener("click", () => {
          state.filter = section.id;
          render();
        });
        filters.appendChild(button);
      });
    }

    function render() {
      renderFilters();
      root.innerHTML = "";

      const materialItems = materialFamilies.map(([name, colors]) => ({ group: "Material", name, colors }));
      const allSections = [
        makeSection("Material Color Families", materialItems, true, true),
        makeSection("2 Colors", palettes.filter((item) => item.group === "2 Colors")),
        makeSection("3 Colors", palettes.filter((item) => item.group === "3 Colors")),
        makeSection("4 Colors", palettes.filter((item) => item.group === "4 Colors")),
        makeSection("5 Colors", palettes.filter((item) => item.group === "5 Colors"), false, true)
      ].filter(Boolean);

      allSections.forEach((section) => root.appendChild(section));
      emptyState.classList.toggle("visible", allSections.length === 0);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const field = document.createElement("textarea");
      field.value = text;
      field.setAttribute("readonly", "");
      field.style.position = "fixed";
      field.style.top = "-1000px";
      document.body.appendChild(field);
      field.select();
      document.execCommand("copy");
      field.remove();
    }

    async function copyHex(hex) {
      const value = hex.toUpperCase();
      try {
        await copyText(value);
        copyStatus.textContent = `Copied ${value}`;
        copyStatus.classList.add("active");
      } catch (error) {
        copyStatus.textContent = `${value} - copy failed, please copy manually.`;
        copyStatus.classList.remove("active");
      }
      window.clearTimeout(copyTimer);
      copyTimer = window.setTimeout(() => {
        copyStatus.textContent = "Click a swatch to copy hex RGB.";
        copyStatus.classList.remove("active");
      }, 2600);
    }

    search.addEventListener("input", () => {
      state.query = search.value;
      render();
    });

    clearSearch.addEventListener("click", () => {
      search.value = "";
      state.query = "";
      search.focus();
      render();
    });

    render();
  </script>
</body>
</html>
